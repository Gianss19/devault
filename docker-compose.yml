services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: devault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devault"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=devault;Username=postgres;Password=${DB_PASSWORD:?DB_PASSWORD must be set}"
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      Jwt__Issuer: devault
      Jwt__Audience: devault
      CryptoSettings__MasterKey: ${MASTER_KEY:?MASTER_KEY must be set}

volumes:
  pgdata:
