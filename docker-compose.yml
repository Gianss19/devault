services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: devault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devault_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devault"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5164:5164"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5164
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=devault;Username=postgres;Password=${DB_PASSWORD:-devault_pass}"
      Jwt__SecretKey: ${JWT_SECRET_KEY:-cambiar_clave_secreta_minimo_32_caracteres}
      Jwt__Issuer: devault
      Jwt__Audience: devault
      CryptoSettings__MasterKey: ${MASTER_KEY:-cambiar_master_key_secreta}

volumes:
  pgdata:
