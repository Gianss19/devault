name: Local LM Studio
version: 1.0.0
schema: v1

models:
  # Chat principal
  - name: Qwen 3.5 9B
    provider: openai
    model: qwen/qwen3.5-9b
    apiBase: http://127.0.0.1:1234/v1
    apiKey: lm-studio
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.2
      contextLength: 32768
      maxTokens: 4096

  # Aplicar cambios a archivos completos
  - name: Qwen2.5 Coder 7B
    provider: openai
    model: qwen2.5-coder-7b-instruct
    apiBase: http://127.0.0.1:1234/v1
    apiKey: lm-studio
    roles:
      - apply
      - edit
    defaultCompletionOptions:
      temperature: 0.1
      contextLength: 32768
      maxTokens: 4096

  # Autocompletado rápido
  - name: Qwen2.5 Coder 3B
    provider: openai
    model: qwen2.5-coder-3b-instruct
    apiBase: http://127.0.0.1:1234/v1
    apiKey: lm-studio
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 256
    model: AUTODETECT
